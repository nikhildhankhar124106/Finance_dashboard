basePath: /api/v1
definitions:
  api.CreateTransactionInput:
    properties:
      amount:
        example: 150
        type: number
      category:
        example: Groceries
        type: string
      date:
        description: 'Format: YYYY-MM-DD'
        example: "2026-05-01"
        type: string
      notes:
        example: Weekly groceries shopping
        type: string
      type:
        enum:
        - Income
        - Expense
        example: Expense
        type: string
    required:
    - amount
    - category
    - date
    - type
    type: object
  api.CreateUserInput:
    properties:
      email:
        example: user@example.com
        type: string
      name:
        example: John Doe
        type: string
    required:
    - email
    - name
    type: object
  api.LoginRequest:
    properties:
      email:
        example: admin@finance.com
        type: string
    required:
    - email
    type: object
  api.UpdateTransactionInput:
    properties:
      amount:
        example: 170
        type: number
      category:
        example: Groceries
        type: string
      date:
        example: "2026-05-02"
        type: string
      notes:
        example: Updated weekly groceries amount
        type: string
      type:
        enum:
        - Income
        - Expense
        example: Expense
        type: string
    type: object
  apperrors.AppError:
    properties:
      details: {}
      message:
        type: string
      status:
        type: integer
    type: object
  models.Transaction:
    properties:
      amount:
        type: number
      category:
        type: string
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      notes:
        type: string
      type:
        $ref: '#/definitions/models.TransactionType'
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.TransactionType:
    enum:
    - Income
    - Expense
    type: string
    x-enum-varnames:
    - TypeIncome
    - TypeExpense
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        $ref: '#/definitions/models.UserRole'
      transactions:
        items:
          $ref: '#/definitions/models.Transaction'
        type: array
      updated_at:
        type: string
    type: object
  models.UserRole:
    enum:
    - Admin
    - Analyst
    - Viewer
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleAnalyst
    - RoleViewer
host: localhost:8080
info:
  contact: {}
  description: REST API documentation integrating Redis caching, Rate-Limiting and
    Structured Logging.
  title: Finance Dashboard API
  version: 1.0 (v1) / 2.0 (v2)
paths:
  /../v2/health:
    get:
      description: Returns the health status of the V2 API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Check API V2 health
      tags:
      - system
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a user mockly (admin@finance.com, analyst@finance.com,
        viewer@finance.com) and returns a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Mock login for authentication
      tags:
      - auth
  /category-breakdown:
    get:
      description: Returns expenses aggregated by category
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch category breakdown
      tags:
      - analytics
  /health:
    get:
      description: Returns the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Check API health
      tags:
      - system
  /monthly-trends:
    get:
      description: Returns income and expenses aggregated by month
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch monthly trends
      tags:
      - analytics
  /summary:
    get:
      description: Returns financial summary metrics (total income, total expense,
        balance) for the dashboard
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch dashboard summary
      tags:
      - analytics
  /system/logs:
    delete:
      description: Deletes system logs natively (admin only)
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete system logs
      tags:
      - system
  /transactions:
    get:
      description: Returns transaction paginated list optionally filtered by category,
        type, and date
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Limits per page
        in: query
        name: page_size
        type: integer
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Filter by type (Income/Expense)
        in: query
        name: type
        type: string
      - description: Filter by exact date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Fetch a list of transactions
      tags:
      - transactions
    post:
      consumes:
      - application/json
      description: Creates a new financial transaction under the active user
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Transaction payload
        in: body
        name: transaction
        required: true
        schema:
          $ref: '#/definitions/api.CreateTransactionInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Transaction'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Create a new transaction
      tags:
      - transactions
  /transactions/{id}:
    delete:
      description: Performs hard deletion of transaction record
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Delete transaction
      tags:
      - transactions
    put:
      consumes:
      - application/json
      description: Modifies an existing transaction
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated values
        in: body
        name: transaction
        required: true
        schema:
          $ref: '#/definitions/api.UpdateTransactionInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Transaction'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apperrors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apperrors.AppError'
      summary: Update transaction
      tags:
      - transactions
  /users:
    get:
      description: Returns a list of all users in the system
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.User'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user in the system
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: User payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/api.CreateUserInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new user
      tags:
      - users
  /users/{id}:
    get:
      description: Fetch details of a specific user
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch a user by ID
      tags:
      - users
schemes:
- http
swagger: "2.0"
